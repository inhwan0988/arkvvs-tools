name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install
        run: npm ci --no-audit --no-fund

      - name: TypeScript 검증
        run: npx tsc --noEmit

      - name: ESLint
        run: npm run lint --if-present
        continue-on-error: true   # 일단 빨간 PR 안 만듬
