name: PR auto-merge

# 모든 PR이 만들어지면:
#  1) auto-merge 라벨 자동 부착 (시각 표시)
#  2) GitHub native auto-merge 자동 활성화 (CI + approve 1명 받으면 즉시 squash merge)
# 직원이 PR만 만들면 라벨/명령 신경 안 써도 됩니다.

on:
  pull_request:
    types: [opened, reopened, ready_for_review, labeled]

permissions:
  pull-requests: write
  contents: write

jobs:
  enable:
    # draft PR은 제외, bot PR도 제외
    if: github.event.pull_request.draft == false && github.event.pull_request.user.type != 'Bot'
    runs-on: ubuntu-latest
    steps:
      - name: 라벨 자동 부착
        if: github.event.action != 'labeled'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          gh pr edit "$PR_NUMBER" --repo "$REPO" --add-label auto-merge || true

      - name: native auto-merge 활성화
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          gh pr merge --auto --squash --delete-branch "$PR_NUMBER" --repo "$REPO"
